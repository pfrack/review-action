name: 'NIM Code Review'
description: 'AI-powered code review using NVIDIA NIM models with fallback'
branding:
  icon: 'search'
  color: 'green'
inputs:
  nim_api_key:
    description: 'NVIDIA NIM API key'
    required: false
    default: ''
  nim_base_url:
    description: 'NIM API base URL'
    default: 'https://integrate.api.nvidia.com/v1'
  nim_models:
    description: 'Comma-separated fallback model chain'
    default: 'minimaxai/minimax-m2.7,z-ai/glm-5.2,qwen/qwen3.5-397b-a17b,stepfun-ai/step-3.7-flash,mistralai/mistral-nemotron,mistralai/mistral-large-3-675b-instruct-2512,minimaxai/minimax-m3'
  mistral_api_key:
    description: 'Mistral API key (enables Mistral models in fallback chain)'
    default: ''
  mistral_base_url:
    description: 'Mistral API base URL'
    default: 'https://api.mistral.ai/v1'
  mistral_models:
    description: 'Comma-separated Mistral model fallback chain'
    default: 'mistral-medium-3.5,mistral-large-2512,mistral-small-2603,codestral-2508'
  custom_api_url:
    description: 'Custom OpenAI-compatible API base URL (tried before NIM models)'
    required: false
    default: ''
  custom_model:
    description: 'Model name for the custom API endpoint'
    required: false
    default: ''
  custom_api_key:
    description: 'API key for the custom endpoint (can be empty for local/keyless endpoints)'
    required: false
    default: ''
  max_files:
    description: 'Max files to review per PR'
    default: '100'
  exclude_patterns:
    description: 'Comma-separated glob patterns to skip'
    default: '*.lock,*.md,*.txt,*.svg,*.png,*.sum,*.json,*.yaml,*.yml,*.toml,*.mod,*.sum,.mimocode/*,go.sum,go.mod,dist/*'
  nim_system_prompt:
    description: 'Custom system prompt (appended to default or replaces it)'
    default: ''
  nim_prompt_mode:
    description: 'How to use custom prompt: append (default, appends after default) or replace (replaces default entirely)'
    default: 'append'
  custom_rules:
    description: 'Custom review rules (one per line, e.g., "Always check for SQL injection")'
    required: false
    default: ''
  revalidate_findings:
    description: 'Re-validate findings with LLM before posting (reduces false positives, adds latency)'
    required: false
    default: 'false'
runs:
  using: 'node24'
  main: 'dist/bundle/index.js'
